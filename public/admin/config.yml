backend:
  name: github
  repo: OWNER/REPO
  branch: main

local_backend: true

site_url: https://pramukaupdate.id
display_url: https://pramukaupdate.id
logo_url: /og-default.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: artikel
    label: Artikel
    label_singular: Artikel
    folder: src/content/artikel
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "artikel/{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Kategori, name: category, widget: string }
      - { label: Ringkasan, name: excerpt, widget: text }
      - { label: Gambar utama, name: image, widget: image, required: false }
      - { label: Tanggal terbit, name: publishedAt, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Waktu baca, name: readTime, widget: string, default: "5 menit" }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Isi artikel, name: body, widget: markdown }
